<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Zhuoran Wang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #0f0f1a;
      --text-primary: #c8c8d4;
      --text-secondary: #6a6a8a;
      --text-bright: #e8e8f0;
      --accent-cyan: #00e5ff;
      --accent-sakura: #ff6b9d;
      --border-dim: rgba(100, 100, 160, 0.15);
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
      --font-body: 'Zen Kaku Gothic New', 'Helvetica Neue', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--text-primary);
      background:
        radial-gradient(ellipse at 20% 10%, rgba(0, 229, 255, 0.08) 0%, transparent 45%),
        radial-gradient(ellipse at 80% 80%, rgba(255, 107, 157, 0.08) 0%, transparent 45%),
        var(--bg-primary);
      font-family: var(--font-body);
      line-height: 1.75;
      padding-top: 78px;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(10, 10, 15, 0.88);
      border-bottom: 1px solid var(--border-dim);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .logo {
      font-family: var(--font-mono);
      letter-spacing: 2px;
      color: var(--accent-cyan);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 1.2rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .nav-links a:hover { color: var(--accent-cyan); }

    main {
      width: min(820px, calc(100% - 3rem));
      margin: 0 auto;
      padding: 2.5rem 0 4rem;
    }

    .meta {
      font-family: var(--font-mono);
      color: var(--accent-cyan);
      letter-spacing: 1px;
      font-size: 0.75rem;
      margin-bottom: 0.8rem;
      text-transform: uppercase;
    }

    h1 {
      color: var(--text-bright);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      line-height: 1.3;
      margin-bottom: 1.4rem;
    }

    .tags {
      margin-bottom: 1.6rem;
      color: var(--accent-sakura);
      font-family: var(--font-mono);
      font-size: 0.72rem;
    }

    article {
      background: rgba(15, 15, 30, 0.45);
      border: 1px solid var(--border-dim);
      padding: 1.6rem;
      border-radius: 10px;
    }

    article p, article li { margin: 0.9rem 0; }
    article a { color: var(--accent-cyan); }
    article h2, article h3 { margin-top: 1.6rem; color: var(--text-bright); }
    article code {
      background: rgba(0, 229, 255, 0.08);
      border: 1px solid rgba(0, 229, 255, 0.18);
      border-radius: 6px;
      padding: 0.1rem 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.85em;
    }
    article pre {
      overflow-x: auto;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid var(--border-dim);
      border-radius: 8px;
      padding: 0.9rem;
      margin: 1rem 0;
    }
    article pre code {
      border: none;
      background: transparent;
      padding: 0;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.4rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent-cyan); }

    @media (max-width: 760px) {
      nav { padding: 0.9rem 1rem; }
      main { width: min(820px, calc(100% - 2rem)); }
    }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="{{ '/' | relative_url }}">ZW_</a>
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
    </ul>
  </nav>

  <main>
    <div class="meta">{{ page.date | date: "%Y-%m-%d" }}</div>
    <h1>{{ page.title }}</h1>
    {% if page.tags and page.tags.size > 0 %}
    <div class="tags">#{{ page.tags | join: " #"}} </div>
    {% endif %}
    <article>
      {{ content }}
    </article>
    <a class="back-link" href="{{ '/blog.html' | relative_url }}">&lt;- Back to all posts</a>
  </main>
</body>
</html>
